<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Oscar 💖</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="estrellas"></div>

    <div class="contenedor-app">
        <header>
            <h1>Te amo Oscar ✨</h1>
            <p class="subtitulo">Nuevo día, nuevo recordatorio de mi amor por ti. Descubre el de hoy.</p>
            
            <div class="contenedor-progreso">
                <p id="texto-progreso">Días disponibles para Oscar: 0 de 0</p>
                <div class="barra-fondo">
                    <div id="barra-llena" class="barra-llena"></div>
                </div>
            </div>
        </header>

        <main id="calendario" class="grid-calendario"></main>
    </div>

    <div id="modal" class="modal oculto">
        <div class="modal-contenido">
            <span id="cerrar-modal" class="cerrar">&times;</span>
            <div class="modal-decoracion">🎵</div>
            <p id="frase-texto"></p>
            
            <div id="spotify-contenedor"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
