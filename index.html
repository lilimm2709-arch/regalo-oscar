<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Oscar 💖</title>
    <!-- Importamos tipografías elegantes de Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contenedor-app">
        <header>
            <h1>Te amo Oscar ✨</h1>
            <p class="subtitulo">Nuevo día, nuevo recordatorio de mi amor por ti. Descubre el de hoy.</p>
        </header>

        <!-- Contenedor del calendario -->
        <main id="calendario" class="grid-calendario"></main>
    </div>

    <!-- Ventana emergente (Modal) con diseño mejorado -->
    <div id="modal" class="modal oculto">
        <div class="modal-contenido">
            <span id="cerrar-modal" class="cerrar">&times;</span>
            <div class="modal-decoracion">💝</div>
            <p id="frase-texto"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
